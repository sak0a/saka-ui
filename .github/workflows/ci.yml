name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build library bundle
        run: bun run build:lib:bundle

      - name: Build registry sources
        run: bun run build:registry

      - name: Build CLI
        run: bun run build:cli

      - name: CLI smoke test
        run: bun run test:smoke

